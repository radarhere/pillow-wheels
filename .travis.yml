env:
  global:
      - REPO_DIR=Pillow
      - BUILD_COMMIT=HEAD
      - PLAT=x86_64
      - UNICODE_WIDTH=32
      - BUILD_DEPENDS=""
      - TEST_DEPENDS="pytest pytest-cov"
      - WHEELHOUSE_UPLOADER_USERNAME=travis-worker
      # Following generated with
      # travis encrypt -r python-pillow/pillow-wheels WHEELHOUSE_UPLOADER_SECRET=<the api key>
      - secure: "ky76goiK6n4k8V9/uG340GSFVwmjE7G76l9xbhhGZkcph4eTwN5VRM/tqyJvlNs/HZOhKSILfyGBeaG8qf7gHmwr0touPT+EjWn4TNV8iyVj75ZshgRE9DuaIAfdH89gW2m+BmvBDyzi0JE3KVCu55NcGm8h7Ecl6nmQ/c2iROY="

language: python
# Default Python version is usually 3.6
python: 3.8
dist: xenial
services: docker

jobs:
  include:
    - name: "3.6 macOS"
      os: osx
      osx_image: xcode10.2
      language: generic
      env:
        - MB_PYTHON_VERSION=3.6


install:
    - HOMEBREW_NO_AUTO_UPDATE=1 brew install python3
    - sudo -H python3 -m pip install --upgrade pip
    - all=":all:"
    - sudo -H python3 -m pip install --upgrade Pillow --no-binary $all